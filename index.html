<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPSTools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fff5f8; min-height: 100vh; }
    .hub { min-height: 100vh; padding: 3rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .name { font-size: 2rem; font-weight: 500; color: #c084a0; letter-spacing: -0.5px; margin-bottom: 4px; }
    .title { font-size: 0.9rem; color: #d4a0b8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2.5rem; }
    .divider { width: 40px; height: 2px; background: #f0c4d8; border-radius: 2px; margin-bottom: 2.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; width: 100%; max-width: 720px; }
    .card { background: #fdf0f5; border: 0.5px solid #f0c4d8; border-radius: 14px; padding: 1.1rem 1.3rem; text-decoration: none; display: flex; flex-direction: column; gap: 4px; transition: transform 0.15s ease, background 0.15s ease; cursor: pointer; }
    .card:hover { background: #fce4ef; transform: translateY(-2px); }
    .card-name { font-size: 1rem; font-weight: 500; color: #b06080; }
    .card-desc { font-size: 0.82rem; color: #c090a8; line-height: 1.5; }
    .card-tag { font-size: 0.72rem; color: #d4a0b8; margin-top: 6px; letter-spacing: 0.5px; }
    .section-label { font-size: 0.75rem; color: #d4a0b8; letter-spacing: 2px; text-transform: uppercase; width: 100%; max-width: 720px; margin-bottom: 10px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a0d12; }
      .name { color: #f0a0c0; }
      .title { color: #c888a8; }
      .divider { background: #a06080; }
      .card { background: #3a1f2a; border-color: #6a3050; }
      .card:hover { background: #4a2535; }
      .card-name { color: #f0b0cc; }
      .card-desc { color: #c090a8; }
      .card-tag { color: #a07088; }
    }
  </style>
</head>
<body>
  <div class="hub">
    <p class="name">MPSTools</p>
    <p class="title">Media & System Utilities</p>
    <div class="divider"></div>

    <div class="section-label">Tools</div>
    <div class="grid">
      <a class="card" href="https://ivoryy06.github.io/Storganizer" target="_blank">
        <span class="card-name">Storganizer</span>
        <span class="card-desc">Fast duplicate finder for media-aware cleanup.</span>
        <span class="card-desc">Started in 2025</span>
        <span class="card-tag">Go · pHash · GitHub Actions</span>a
      </a>
      <a class="card" href="https://ivoryy06.github.io/cardnuke" target="_blank">
        <span class="card-name">cardnuker</span>
        <span class="card-desc">Wipe, recover, verify, and restore SD/USB media safely.</span>
        <span class="card-desc">Started in 2026</span>
        <span class="card-tag">Python · Bash · Native CLI</span>
      </a>
    </div>
  </div>
</body>
</html>
